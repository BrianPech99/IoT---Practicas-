<!DOCTYPE html>
<html>
<head>
<title>Token FCM</title>
</head>

<body>

<h2>Generar Token Firebase</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZ2hnk--HUJMXD7LkMnuCDW_azMezLcHU",
  authDomain: "iot-alert-lab.firebaseapp.com",
  projectId: "iot-alert-lab",
  storageBucket: "iot-alert-lab.firebasestorage.app",
  messagingSenderId: "335737889047",
  appId: "1:335737889047:web:f4ed22d03bbb9888015752"
};

const app = initializeApp(firebaseConfig);

const messaging = getMessaging(app);

Notification.requestPermission().then((permission) => {

  if (permission === "granted") {

    getToken(messaging, {
      vapidKey: "BPQY7JeR0qhL5--PMJX_X_mwEpwgQb7D2rfkbDPJNSwpURfjEIn8RPlgfjIjbF-eHXLT83r2MU_PQZvao4_KIG0"
    }).then((currentToken) => {

      if (currentToken) {

        console.log("TOKEN FCM:");
        console.log(currentToken);

        document.body.innerHTML += "<p><b>TOKEN:</b><br>" + currentToken + "</p>";

      } else {

        console.log("No se pudo generar token");

      }

    });

  }

});

</script>

</body>
</html>
